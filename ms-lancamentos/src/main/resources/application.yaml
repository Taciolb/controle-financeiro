server:
  port: 8083

spring:
  application:
    name: ms-lancamentos

  datasource:
    url: jdbc:postgresql://localhost:5432/CF_lancamentos
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    data-format: yyyy-MM-dd HH:mm:ss
    time-zone: America/Sao_Paulo

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}

  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui.html

  logging:
    level:
      root: INFO
      br.com.controlefinanceiro: DEBUG